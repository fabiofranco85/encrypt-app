name: Hushbox
options:
  bundleIdPrefix: com.hushbox
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  Sodium:
    url: https://github.com/jedisct1/swift-sodium
    from: "0.9.1"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_LANGUAGE: en
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Hushbox:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    dependencies:
      - package: Sodium
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hushbox.app
        PRODUCT_NAME: Hushbox
        TARGETED_DEVICE_FAMILY: "1" # iPhone only
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic

  HushboxTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/HushboxTests
    dependencies:
      - target: Hushbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hushbox.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
        SWIFT_STRICT_CONCURRENCY: complete

  HushboxIntegrationTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/HushboxIntegrationTests
    dependencies:
      - target: Hushbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hushbox.integrationtests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
        SWIFT_STRICT_CONCURRENCY: complete

schemes:
  Hushbox:
    build:
      targets:
        Hushbox: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - HushboxTests
        - HushboxIntegrationTests
