name: Cipherbox
options:
  bundleIdPrefix: com.cipherbox
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  Sodium:
    url: https://github.com/jedisct1/swift-sodium
    from: "0.9.1"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_LANGUAGE: en
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Cipherbox:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
    dependencies:
      - package: Sodium
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cipherbox.app
        PRODUCT_NAME: Cipherbox
        TARGETED_DEVICE_FAMILY: "1" # iPhone only
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic

  CipherboxTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/CipherboxTests
    dependencies:
      - target: Cipherbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cipherbox.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
        SWIFT_STRICT_CONCURRENCY: complete

  CipherboxIntegrationTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/CipherboxIntegrationTests
    dependencies:
      - target: Cipherbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cipherbox.integrationtests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
        SWIFT_STRICT_CONCURRENCY: complete

schemes:
  Cipherbox:
    build:
      targets:
        Cipherbox: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - CipherboxTests
        - CipherboxIntegrationTests
