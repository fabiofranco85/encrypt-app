name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref to save runner time.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      # Cipherbox targets iOS 26 and uses Liquid Glass, so it needs the iOS 26 SDK.
      # The macos-15 image ships several Xcodes; 16.4 is the default, so select 26.
      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Install tools
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Cipherbox.xcodeproj \
            -scheme Cipherbox \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=26.2' \
            -resultBundlePath TestResults.xcresult \
            | xcbeautify

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: TestResults.xcresult
